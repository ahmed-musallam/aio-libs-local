name: Release

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      # Do not set registry-url — breaks semantic-release npm OIDC / trusted publishing
      - uses: actions/setup-node@v4
        with:
          # semantic-release v25: ^22.14.0 || >= 24.10.0 (firefly-sdk uses 24)
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Format check
        run: pnpm run fmt:check

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm exec vitest run

      - name: Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: "0"
          CI: "true"
