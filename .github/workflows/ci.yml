name: CI

on:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Windows runners default core.autocrlf=true, which breaks oxfmt --check (expects LF).
      - name: Use LF line endings on checkout
        if: runner.os == 'Windows'
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Format check
        run: pnpm run fmt:check

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test
